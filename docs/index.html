<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce Field Inspector</title>
  <meta name="description" content="Hover over any field on a Salesforce Lightning record page to instantly see its API name, type, formula, and more." />
  <link rel="icon" type="image/png" href="icon48.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css" />
  <style>
    :root {
      --theme-color: #0ea5e9;
      --base-font-size: 15px;
      --sidebar-width: 0px;
      --navbar-root-color: #f0f9ff;
      --navbar-root-color--hover: #fff;
      --navbar-root-background: transparent;
      --navbar-root-background--hover: rgba(255,255,255,0.1);
      --navbar-root-border-radius: 6px;
      --navbar-root-padding: 6px 14px;
      --navbar-root-font-size: 14px;
      --navbar-root-font-weight: 500;
    }

    /* ── App name / logo ───────────────────────── */
    .app-name {
      padding: 0 16px !important;
    }
    .app-name-link {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
      text-decoration: none !important;
      color: #f0f9ff !important;
      font-weight: 700 !important;
      font-size: 16px !important;
      white-space: nowrap !important;
    }
    .app-name-link img {
      width: 28px;
      height: 28px;
    }

    /* ── Navbar ────────────────────────────────── */
    .app-nav {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      height: 56px !important;
      display: flex !important;
      align-items: center !important;
      background: linear-gradient(135deg, #0c2a4a 0%, #0369a1 100%) !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3) !important;
      padding: 0 24px !important;
      z-index: 100 !important;
      margin: 0 !important;
    }
    .app-nav > ul {
      display: flex !important;
      align-items: center !important;
      gap: 4px !important;
      list-style: none !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    .app-nav > ul > li > a {
      display: block !important;
      padding: 6px 14px !important;
      border-radius: 6px !important;
      color: #f0f9ff !important;
      font-size: 14px !important;
      font-weight: 500 !important;
      text-decoration: none !important;
      transition: background 0.15s, color 0.15s !important;
      white-space: nowrap !important;
    }
    .app-nav > ul > li > a:hover {
      background: rgba(255,255,255,0.15) !important;
      color: #fff !important;
    }
    .app-nav > ul > li.current > a {
      background: rgba(14,165,233,0.3) !important;
      color: #fff !important;
    }

    /* ── Main content area ─────────────────────── */
    .content {
      padding-top: 72px !important;
    }
    main {
      max-width: 860px !important;
      margin: 0 auto !important;
      padding: 32px 40px 60px !important;
    }

    /* ── Sidebar hidden ─────────────────────────── */
    .sidebar { display: none !important; }
    .sidebar-toggle { display: none !important; }

    /* ── Hero block on home page ────────────────── */
    .hero {
      text-align: center;
      padding: 48px 0 32px;
    }
    .hero img {
      width: 80px;
      margin-bottom: 16px;
    }

    /* ── Markdown content ───────────────────────── */
    h1 { color: #0f172a; font-size: 2rem; }
    h2 { color: #0369a1; border-bottom: 2px solid #e0f2fe; padding-bottom: 6px; }
    h3 { color: #0c4a6e; }
    table { width: 100%; border-collapse: collapse; }
    table th { background: #0369a1; color: #fff; padding: 10px 14px; text-align: left; }
    table td { padding: 9px 14px; border-bottom: 1px solid #e2e8f0; }
    table tr:nth-child(even) td { background: #f0f9ff; }
    blockquote {
      border-left: 4px solid #0ea5e9;
      background: #f0f9ff;
      padding: 12px 18px;
      border-radius: 0 6px 6px 0;
      color: #0c4a6e;
      margin: 16px 0;
    }
    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: #0369a1;
    }
    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }
    .badge {
      display: inline-block;
      background: #0ea5e9;
      color: #fff;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="icon48.png" alt="logo"> Salesforce Field Inspector',
      nameLink: '/',
      repo: 'https://github.com/amrit-suman/Salesforce-Field-Inspector',
      basePath: '/Salesforce-Field-Inspector/',
      loadSidebar: false,
      loadNavbar: true,
      subMaxLevel: 2,
      auto2top: true,
      routerMode: 'hash',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
