<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salesforce Field Inspector</title>
  <meta name="description" content="Hover over any field on a Salesforce Lightning record page to instantly see its API name, type, formula, and more." />
  <link rel="icon" type="image/png" href="icon48.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css" />
  <style>
    /* ── Sidebar title ─────────────────────────── */
    .app-name-link {
      font-size: 15px !important;
      font-weight: 700 !important;
      color: #2c3e50 !important;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    .app-name-link img {
      width: 24px;
      height: 24px;
    }

    /* ── Sidebar nav ───────────────────────────── */
    .sidebar-nav ul {
      padding: 0 !important;
    }
    .sidebar-nav li a {
      font-size: 14px !important;
      color: #364149 !important;
      padding: 6px 0 !important;
    }
    .sidebar-nav li.active > a {
      color: #42b983 !important;
      font-weight: 600 !important;
      border-left: 3px solid #42b983 !important;
      padding-left: 10px !important;
    }

    /* ── GitHub corner ─────────────────────────── */
    .github-corner svg {
      fill: #42b983 !important;
      color: #fff !important;
    }

    /* ── Content typography ────────────────────── */
    .markdown-section h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 12px;
    }
    .markdown-section h2 {
      font-size: 1.4rem;
      color: #2c3e50;
      border-bottom: 1px solid #eaecef;
      padding-bottom: 8px;
    }
    .markdown-section table th {
      background: #f5f7fa;
      color: #2c3e50;
    }
    .markdown-section blockquote {
      border-left: 4px solid #42b983;
      background: #f9fff9;
      color: #476582;
    }

    /* ── Version badges ────────────────────────── */
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .badge-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 4px;
      overflow: hidden;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-pill .badge-label {
      background: #555;
      color: #fff;
      padding: 4px 8px;
    }
    .badge-pill .badge-version {
      background: #42b983;
      color: #fff;
      padding: 4px 8px;
    }
    .badge-pill .badge-version.blue {
      background: #0ea5e9;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="icon48.png" alt=""> Salesforce Field Inspector',
      nameLink: '/',
      repo: 'https://github.com/amrit-suman/Salesforce-Field-Inspector',
      basePath: '/Salesforce-Field-Inspector/',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 1,
      auto2top: true,
      routerMode: 'hash',
      pagination: {
        previousText: 'PREV',
        nextText: 'NEXT',
        crossChapter: true,
        crossChapterText: true,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
